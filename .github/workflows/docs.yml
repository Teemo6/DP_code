name: Deploy TypeDoc to GitHub Pages

on:
  workflow_call:
  workflow_dispatch:

jobs:
  publish-typedoc:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    defaults:
      run:
        working-directory: gui4vega
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui4vega/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build TypeDoc
        run: npm run doc

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gui4vega/doc

      - name: Deploy TypeDoc to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4